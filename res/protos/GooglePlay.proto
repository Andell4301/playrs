message ClientDownloadRequest {
  message ApkInfo {
    optional string package_name = 1;
    optional int32 version_code = 2;
  }
  message CertificateChain {
    message Element {
      optional bytes certificate = 1;
      optional bool parsed_successfully = 2;
      optional bytes subject = 3;
      optional bytes issuer = 4;
      optional bytes fingerprint = 5;
      optional int64 expiry_time = 6;
      optional int64 start_time = 7;
    }
    repeated Element element = 1;
  }
  message Digests {
    optional bytes sha256 = 1;
    optional bytes sha1 = 2;
    optional bytes md5 = 3;
  }
  message Resource {
    optional string url = 1;
    optional int32 type = 2;
    optional bytes remote_ip = 3;
    optional string referrer = 4;
  }
  message SignatureInfo {
    repeated CertificateChain certificate_chain = 1;
    optional bool trusted = 2;
  }
  optional string url = 1;
  optional Digests digests = 2;
  optional int64 length = 3;
  repeated Resource resources = 4;
  optional SignatureInfo signature = 5;
  optional bool user_initiated = 6;
  repeated string client_asn = 8;
  optional string file_basename = 9;
  optional int32 download_type = 10;
  optional string locale = 11;
  optional ApkInfo apk_info = 12;
  optional fixed64 android_id = 13;
  repeated string originating_packages = 15;
  optional SignatureInfo originating_signature = 17;
}

message ClientDownloadResponse {
  message MoreInfo {
    optional string description = 1;
    optional string url = 2;
  }
  optional int32 verdict = 1;

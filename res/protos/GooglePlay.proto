syntax = "proto2";

message AndroidAppDeliveryData {
  optional int64 download_size = 1;
  optional string sha1 = 2;
  optional string download_url = 3;
  repeated AppFileMetadata additional_file = 4;
  repeated HttpCookie download_auth_cookie = 5;
  optional bool forward_locked = 6;
  optional int64 refund_timeout = 7;
  optional bool server_initiated = 8 [default = true];
  optional int64 post_install_refund_window_millis = 9;
  optional bool immediate_start_needed = 10;
  optional AndroidAppPatchData patch_data = 11;
  optional EncryptionParams encryption_params = 12;
  optional string compressed_download_url = 13;
  optional int64 compressed_size = 14;
  repeated SplitDeliveryData split_delivery_data = 15;
  optional int32 install_location = 16;
  optional int64 type = 17;
  optional CompressedAppData compressed_app_data = 18;
  optional string sha256 = 19;
  optional DexMetadata dex_metadata = 21;
}

message DexMetadata {
  optional int64 download_size = 1;
  optional string sha256 = 2;
  optional string download_url = 3;
}

message SplitDeliveryData {
  optional string name = 1;
  optional int64 download_size = 2;
  optional int64 compressed_size = 3;
  optional string sha1 = 4;
  optional string download_url = 5;
  optional string compressed_download_url = 6;
  optional AndroidAppPatchData patch_data = 7;
  optional CompressedAppData compressed_app_data = 8;
  optional string sha256 = 9;
}

message AndroidAppPatchData {
  optional int32 base_version_code = 1;
  optional string base_sha1 = 2;
  optional string download_url = 3;
  optional int32 patch_format = 4[default = 1];
  optional int64 max_patch_size = 5;
}

message CompressedAppData{
  optional int64 type = 1;
  optional int64 size = 2;
  optional string download_url = 3;
}

message AppFileMetadata {
  optional int32 file_type = 1;
  optional int32 version_code = 2;
  optional int64 download_size = 3;
  optional string download_url = 4;
  optional AndroidAppPatchData patch_data = 5;
  optional int64 compressed_size = 6;
  optional string compressed_download_url = 7;
  optional string sha1 = 8;
}

message EncryptionParams {
  optional int32 version = 1;
  optional string encryption_key = 2;
  optional string hmac_key = 3;
}

message HttpCookie {
  optional string name = 1;
  optional string value = 2;
}

